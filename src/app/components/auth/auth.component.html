<div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-header">
        <h1 class="logo">Nasdaq & SP 500</h1>
        <p class="tagline">Tu cartera de inversiones</p>
      </div>
  
      <!-- Tabs -->
      <div class="auth-tabs">
        <button 
          class="tab-button"
          [class.active]="mode === 'login'"
          (click)="toggleMode()"
          type="button">
          Iniciar Sesión
        </button>
        <button 
          class="tab-button"
          [class.active]="mode === 'register'"
          (click)="toggleMode()"
          type="button">
          Registrarse
        </button>
      </div>
  
      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        <span>⚠️ {{ errorMessage }}</span>
        <button class="close-error" (click)="clearError()">×</button>
      </div>
  
      <!-- Login Form -->
      <form *ngIf="mode === 'login'" (ngSubmit)="onLogin()" class="auth-form">
        <div class="form-group">
          <label for="email-login">Correo electrónico</label>
          <input 
            id="email-login"
            type="email" 
            [(ngModel)]="email"
            name="email"
            placeholder="tu@email.com"
            [disabled]="loading"
            required>
        </div>
  
        <div class="form-group">
          <label for="password-login">Contraseña</label>
          <input 
            id="password-login"
            type="password" 
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            [disabled]="loading"
            required>
        </div>
  
        <button 
          type="submit" 
          class="submit-button"
          [disabled]="loading">
          <span *ngIf="!loading">Iniciar Sesión</span>
          <span *ngIf="loading" class="loading-spinner">⏳ Cargando...</span>
        </button>
      </form>
  
      <!-- Register Form -->
      <form *ngIf="mode === 'register'" (ngSubmit)="onRegister()" class="auth-form">
        <div class="form-group">
          <label for="name-register">Nombre completo</label>
          <input 
            id="name-register"
            type="text" 
            [(ngModel)]="displayName"
            name="displayName"
            placeholder="Juan Pérez"
            [disabled]="loading"
            required>
        </div>
  
        <div class="form-group">
          <label for="email-register">Correo electrónico</label>
          <input 
            id="email-register"
            type="email" 
            [(ngModel)]="email"
            name="email"
            placeholder="tu@email.com"
            [disabled]="loading"
            required>
        </div>
  
        <div class="form-group">
          <label for="password-register">Contraseña</label>
          <input 
            id="password-register"
            type="password" 
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            [disabled]="loading"
            minlength="6"
            required>
          <small>Mínimo 6 caracteres</small>
        </div>
  
        <div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <input 
            id="confirm-password"
            type="password" 
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            [disabled]="loading"
            required>
        </div>
  
        <button 
          type="submit" 
          class="submit-button"
          [disabled]="loading">
          <span *ngIf="!loading">Crear Cuenta</span>
          <span *ngIf="loading" class="loading-spinner">⏳ Creando cuenta...</span>
        </button>
      </form>
  
      <!-- Footer -->
      <div class="auth-footer">
        <p class="disclaimer">
          🔒 Tus datos están protegidos con Firebase Authentication
        </p>
      </div>
    </div>
  </div>
