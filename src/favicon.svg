<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo circular con degradado -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="32" cy="32" r="30" fill="url(#grad3)"/>
  
  <!-- Barras de fondo (histograma) -->
  <rect x="12" y="38" width="4" height="10" fill="rgba(255,255,255,0.2)" rx="2"/>
  <rect x="20" y="34" width="4" height="14" fill="rgba(255,255,255,0.2)" rx="2"/>
  <rect x="28" y="28" width="4" height="20" fill="rgba(255,255,255,0.25)" rx="2"/>
  <rect x="36" y="24" width="4" height="24" fill="rgba(255,255,255,0.25)" rx="2"/>
  <rect x="44" y="18" width="4" height="30" fill="rgba(255,255,255,0.3)" rx="2"/>
  
  <!-- Línea de tendencia principal -->
  <polyline 
    points="10,46 18,40 26,32 34,24 42,16 50,10"
    fill="none"
    stroke="#ffffff"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  
  <!-- Puntos de datos -->
  <circle cx="10" cy="46" r="2.5" fill="#fbbf24"/>
  <circle cx="18" cy="40" r="2.5" fill="#fbbf24"/>
  <circle cx="26" cy="32" r="2.5" fill="#22c55e"/>
  <circle cx="34" cy="24" r="2.5" fill="#22c55e"/>
  <circle cx="42" cy="16" r="2.5" fill="#10b981"/>
  <circle cx="50" cy="10" r="3" fill="#10b981"/>
  
  <!-- Símbolo de tendencia alcista (arriba-derecha) -->
  <path 
    d="M 48 6 L 54 10 L 52 12" 
    fill="none" 
    stroke="#10b981" 
    stroke-width="2.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"/>
  
  <!-- Pequeño "+" indicando crecimiento -->
  <text x="54" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">+</text>
</svg>
